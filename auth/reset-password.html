<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encore — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/toast.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #e8470a; --orange-dark: #c43a06;
      --bg: #0C0C0C; --card: #141414; --border: #262626;
      --text: #F0EDE8; --muted: #9A9590; --light: #1C1C1C;
      --danger: #ff3b30; --success: #34c759;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

    nav { display: flex; align-items: center; padding: 0 2.5rem; height: 60px; background: rgba(12,12,12,0.9); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
    .nav-brand { display: flex; align-items: center; gap: .6rem; text-decoration: none; }
    .nav-brand-icon { width: 32px; height: 32px; background: var(--orange); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .nav-brand-icon svg { width: 16px; height: 16px; }
    .nav-brand-name { font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: -.02em; }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card {
      width: 100%; max-width: 420px; background: var(--card);
      border-radius: 16px; border: 1px solid var(--border);
      padding: 2.5rem; box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }
    .card-icon { width: 56px; height: 56px; background: rgba(232,71,10,.1); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
    .card-icon svg { width: 28px; height: 28px; color: var(--orange); }
    h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -.025em; margin-bottom: .4rem; }
    .subtitle { font-size: .875rem; color: var(--muted); margin-bottom: 1.75rem; line-height: 1.6; }

    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .4rem; }
    .form-group input { width: 100%; padding: .75rem 1rem; border: 1.5px solid var(--border); border-radius: 9px; background: var(--light); font-family: 'Inter', sans-serif; font-size: .925rem; color: var(--text); outline: none; transition: border-color .18s, box-shadow .18s; }
    .form-group input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(232,71,10,.12); background: #1C1C1C; }

    .password-strength { margin-top: .4rem; display: flex; gap: .3rem; }
    .strength-bar { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background .3s; }
    .strength-bar.weak   { background: var(--danger); }
    .strength-bar.medium { background: #ff9500; }
    .strength-bar.strong { background: var(--success); }
    .strength-label { font-size: .72rem; color: var(--muted); margin-top: .3rem; }

    .btn { width: 100%; padding: .875rem; background: var(--orange); color: #fff; border: none; border-radius: 9px; font-family: 'Inter', sans-serif; font-size: .95rem; font-weight: 700; cursor: pointer; transition: background .18s; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .btn:hover { background: var(--orange-dark); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert { display: none; padding: .8rem 1rem; border-radius: 9px; font-size: .85rem; font-weight: 500; margin-bottom: 1rem; }
    .alert.error   { display: flex; background: #fff0f0; color: var(--danger); border: 1px solid #ffd0d0; }
    .alert.success { display: flex; background: #f0fff4; color: #1a7a3a; border: 1px solid #c0f0cc; }

    .back-link { display: block; text-align: center; margin-top: 1.25rem; font-size: .85rem; color: var(--muted); text-decoration: none; }
    .back-link:hover { color: var(--text); }

    /* Success state */
    .success-state { display: none; text-align: center; }
    .success-state .check-circle { width: 64px; height: 64px; background: rgba(52,199,89,.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
    .success-state .check-circle svg { width: 32px; height: 32px; color: var(--success); }
    .success-state h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: .5rem; }
    .success-state p { font-size: .875rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }
    .btn-login { display: block; width: 100%; padding: .875rem; background: var(--orange); color: #fff; border: none; border-radius: 9px; font-family: 'Inter', sans-serif; font-size: .95rem; font-weight: 700; cursor: pointer; text-decoration: none; text-align: center; transition: background .18s; }
    .btn-login:hover { background: var(--orange-dark); }
    input, textarea, select { color: #F0EDE8 !important; }
    input:focus, textarea:focus, select:focus { color: #F0EDE8 !important; }
    input:-webkit-autofill, input:-webkit-autofill:focus,
    textarea:-webkit-autofill, select:-webkit-autofill {
      -webkit-text-fill-color: #F0EDE8 !important;
    }
    input::placeholder, textarea::placeholder { color: #888; opacity: 1; }



  </style>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e8470a">
</head>
<body>

  <nav>
    <a href="../login/login.html" class="nav-brand">
      <div class="nav-brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2.5" y="11" width="5" height="10" rx="2.5" fill="#fff"/><rect x="9.5" y="5" width="5" height="16" rx="2.5" fill="#fff"/><rect x="16.5" y="8" width="5" height="8" rx="2.5" fill="#fff"/></svg>
      </div>
      <span class="nav-brand-name">Encore</span>
    </a>
  </nav>

  <div class="page">
    <div class="card">

      <!-- Reset form -->
      <div id="reset-form">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h1>Set new password</h1>
        <p class="subtitle">Choose a strong password for your Encore account. It must be at least 8 characters.</p>

        <div class="alert" id="alert"></div>

        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" placeholder="Min. 8 characters" autocomplete="new-password">
          <div class="password-strength" id="strength-bars">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
          </div>
          <div class="strength-label" id="strength-label"></div>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password">
        </div>

        <button class="btn" id="btn-reset" onclick="handleReset()">
          <span id="btn-label">Update Password</span>
          <div class="spinner" id="spinner"></div>
        </button>

        <a href="../login/login.html" class="back-link">← Back to Sign In</a>
      </div>

      <!-- Success state -->
      <div class="success-state" id="success-state">
        <div class="check-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>Password updated!</h2>
        <p>Your password has been changed successfully. You can now sign in with your new password.</p>
        <a href="../login/login.html" class="btn-login">Sign In</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL  = 'https://qgvoznhldglucpsaisfs.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFndm96bmhsZGdsdWNwc2Fpc2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTU4MjUsImV4cCI6MjA5MTc3MTgyNX0.e-5X1Lh4Tg8cP-FL-3eorV5pAZCDe4CR6i2AFeDKHWQ';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    // Supabase embeds the recovery token in the URL hash on redirect.
    // Calling getSession() will exchange it automatically.
    sb.auth.onAuthStateChange(async (event) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Token is valid — form is ready
      }
    });

    // ── Password strength meter ───────────────────────────────────────────────
    document.getElementById('new-password').addEventListener('input', function () {
      const v = this.value;
      let score = 0;
      if (v.length >= 8)  score++;
      if (v.length >= 12) score++;
      if (/[A-Z]/.test(v) && /[0-9!@#$%^&*]/.test(v)) score++;

      const bars   = ['bar1','bar2','bar3'];
      const labels = ['', 'Weak', 'Medium', 'Strong'];
      const cls    = ['', 'weak', 'medium', 'strong'];

      bars.forEach((id, i) => {
        const el = document.getElementById(id);
        el.className = 'strength-bar' + (i < score ? ' ' + cls[score] : '');
      });
      document.getElementById('strength-label').textContent = labels[score];
    });

    // ── Alert helpers ─────────────────────────────────────────────────────────
    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + type;
    }

    // ── Reset handler ─────────────────────────────────────────────────────────
    async function handleReset() {
      const pw      = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!pw || pw.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
      if (pw !== confirm)        { showAlert('Passwords do not match.'); return; }

      document.getElementById('btn-reset').disabled = true;
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('btn-label').style.display = 'none';

      const { error } = await sb.auth.updateUser({ password: pw });

      document.getElementById('btn-reset').disabled = false;
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('btn-label').style.display = 'inline';

      if (error) { showAlert(error.message); return; }

      // Show success state
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleReset();
    });
  </script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
