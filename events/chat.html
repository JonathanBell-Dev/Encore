<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Chat — Encore ATL</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e8470a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../src/utils/notifications.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #e8470a; --bg: #0C0C0C; --card: #141414; --border: #262626;
      --text: #F0EDE8; --muted: #9A9590; --light: #1C1C1C; --success: #34c759;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
    nav { display: flex; align-items: center; padding: 0 1.5rem; height: 58px; background: rgba(12,12,12,.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; backdrop-filter: blur(12px); gap: .75rem; flex-shrink: 0; }
    .nav-back { display: flex; align-items: center; gap: .4rem; font-size: .85rem; font-weight: 600; color: var(--muted); text-decoration: none; }
    .nav-back:hover { color: var(--text); }
    .nav-title { font-size: .95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: .5rem; }

    .chat-wrap { flex: 1; display: flex; flex-direction: column; max-width: 700px; width: 100%; margin: 0 auto; padding: 0; }
    .chat-header { padding: 1rem 1.5rem .75rem; border-bottom: 1px solid var(--border); }
    .chat-event-title { font-size: 1rem; font-weight: 700; }
    .chat-subtitle { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
    .chat-members { font-size: .72rem; color: var(--orange); font-weight: 600; margin-top: .2rem; }

    .messages { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: .75rem; }
    .msg { display: flex; gap: .65rem; align-items: flex-start; }
    .msg.mine { flex-direction: row-reverse; }
    .msg-av { width: 30px; height: 30px; border-radius: 50%; background: var(--orange); display: flex; align-items: center; justify-content: center; font-size: .6rem; font-weight: 700; color: #fff; flex-shrink: 0; overflow: hidden; }
    .msg-av img { width: 100%; height: 100%; object-fit: cover; }
    .msg-body { max-width: 70%; }
    .msg-name { font-size: .68rem; font-weight: 700; color: var(--muted); margin-bottom: .2rem; }
    .mine .msg-name { text-align: right; }
    .msg-bubble { background: var(--card); border: 1px solid var(--border); border-radius: 14px; border-top-left-radius: 4px; padding: .65rem .85rem; font-size: .88rem; line-height: 1.45; word-break: break-word; }
    .mine .msg-bubble { background: var(--orange); border-color: transparent; border-top-left-radius: 14px; border-top-right-radius: 4px; color: #fff; }
    .msg-time { font-size: .62rem; color: var(--muted); margin-top: .2rem; }
    .mine .msg-time { text-align: right; }

    .chat-input-wrap { padding: .9rem 1.5rem; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; display: flex; gap: .6rem; align-items: flex-end; }
    .chat-input { flex: 1; background: var(--light); border: 1px solid var(--border); border-radius: 22px; padding: .65rem 1rem; font-size: .88rem; font-family: 'Inter', sans-serif; color: var(--text); resize: none; max-height: 120px; line-height: 1.45; outline: none; }
    .chat-input:focus { border-color: var(--orange); color: var(--text); }
    .chat-input::placeholder { color: var(--muted); }
    .btn-send { width: 38px; height: 38px; border-radius: 50%; background: var(--orange); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s; }
    .btn-send:hover { background: #c43a06; }
    .btn-send:disabled { opacity: .5; cursor: not-allowed; }

    .login-prompt { padding: 3rem 1.5rem; text-align: center; color: var(--muted); }
    .login-prompt a { color: var(--orange); font-weight: 700; text-decoration: none; }
    .empty-chat { padding: 3rem 1.5rem; text-align: center; color: var(--muted); font-size: .85rem; }
    .loading { padding: 2rem 1.5rem; text-align: center; color: var(--muted); font-size: .85rem; }
    .not-attendee { padding: 2.5rem 1.5rem; text-align: center; }
    .not-attendee p { color: var(--muted); font-size: .88rem; margin-bottom: 1rem; }
    .not-attendee a { background: var(--orange); color: #fff; padding: .7rem 1.5rem; border-radius: 9px; text-decoration: none; font-weight: 700; font-size: .88rem; }

    input:-webkit-autofill, textarea:-webkit-autofill { -webkit-text-fill-color: #F0EDE8 !important; }
  </style>
</head>
<body>

<nav>
  <a href="detail.html" class="nav-back" id="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><polyline points="15 18 9 12 15 6"/></svg>
    Event
  </a>
  <span class="nav-title" id="nav-title">Event Chat</span>
  <div class="nav-right" id="nav-auth-actions"></div>
</nav>

<div class="chat-wrap">
  <div id="chat-header-section" class="chat-header" style="display:none">
    <div class="chat-event-title" id="chat-event-title"></div>
    <div class="chat-subtitle">Community chat for attendees</div>
    <div class="chat-members" id="chat-members"></div>
  </div>

  <div class="messages" id="messages">
    <div class="loading">Loading chat…</div>
  </div>

  <div id="input-area" style="display:none" class="chat-input-wrap">
    <textarea class="chat-input" id="chat-input" placeholder="Say something to the group…" rows="1"></textarea>
    <button class="btn-send" id="btn-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://qgvoznhldglucpsaisfs.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFndm96bmhsZGdsdWNwc2Fpc2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTU4MjUsImV4cCI6MjA5MTc3MTgyNX0.e-5X1Lh4Tg8cP-FL-3eorV5pAZCDe4CR6i2AFeDKHWQ';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  let currentUser = null;
  let currentAccount = null;
  let eventId = null;
  let channel = null;

  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function renderMsg(msg, myId) {
    const isMine = msg.sender_id === myId;
    const name = msg.accounts ? `${msg.accounts.first_name||''} ${msg.accounts.last_name||''}`.trim() || msg.accounts.user_name || 'Member' : 'Member';
    const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const avContent = msg.accounts?.avatar_url ? `<img src="${escHtml(msg.accounts.avatar_url)}">` : initials;
    return `<div class="msg${isMine?' mine':''}">
      <div class="msg-av">${avContent}</div>
      <div class="msg-body">
        ${isMine ? '' : `<div class="msg-name">${escHtml(name)}</div>`}
        <div class="msg-bubble">${escHtml(msg.body)}</div>
        <div class="msg-time">${formatTime(msg.created_at)}</div>
      </div>
    </div>`;
  }

  function scrollBottom() {
    const el = document.getElementById('messages');
    el.scrollTop = el.scrollHeight;
  }

  async function loadMessages() {
    const { data: msgs } = await sb.from('event_messages')
      .select('id,body,created_at,sender_id,accounts!event_messages_sender_id_fkey(first_name,last_name,user_name,avatar_url)')
      .eq('event_id', eventId)
      .order('created_at', { ascending: true })
      .limit(200);

    const el = document.getElementById('messages');
    if (!msgs || !msgs.length) {
      el.innerHTML = '<div class="empty-chat">No messages yet. Be the first to say hi!</div>';
    } else {
      el.innerHTML = msgs.map(m => renderMsg(m, currentUser?.id)).join('');
    }
    scrollBottom();
  }

  function subscribeRealtime() {
    channel = sb.channel(`event-chat-${eventId}`)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'event_messages',
        filter: `event_id=eq.${eventId}`
      }, async (payload) => {
        // Fetch full message with account info
        const { data: msg } = await sb.from('event_messages')
          .select('id,body,created_at,sender_id,accounts!event_messages_sender_id_fkey(first_name,last_name,user_name,avatar_url)')
          .eq('id', payload.new.id)
          .maybeSingle();
        if (!msg) return;
        const el = document.getElementById('messages');
        const empty = el.querySelector('.empty-chat');
        if (empty) empty.remove();
        el.insertAdjacentHTML('beforeend', renderMsg(msg, currentUser?.id));
        scrollBottom();
      })
      .subscribe();
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const body = input.value.trim();
    if (!body || !currentUser) return;
    const btn = document.getElementById('btn-send');
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';
    const { error } = await sb.from('event_messages').insert({ event_id: eventId, sender_id: currentUser.id, body });
    if (error) {
      input.value = body;
      console.error(error);
    }
    btn.disabled = false;
    input.focus();
  }

  async function init() {
    const params = new URLSearchParams(location.search);
    eventId = params.get('event');
    if (!eventId) { document.getElementById('messages').innerHTML = '<div class="loading">No event specified.</div>'; return; }

    const [{ data: { session } }, { data: ev }] = await Promise.all([
      sb.auth.getSession(),
      sb.from('events').select('id,title').eq('id', eventId).maybeSingle()
    ]);

    if (!ev) { document.getElementById('messages').innerHTML = '<div class="loading">Event not found.</div>'; return; }

    document.getElementById('nav-back').href = `detail.html?id=${eventId}`;
    document.getElementById('nav-title').textContent = ev.title || 'Event Chat';
    document.getElementById('chat-event-title').textContent = ev.title || 'Event';
    document.getElementById('chat-header-section').style.display = 'block';

    if (!session) {
      document.getElementById('messages').innerHTML = `<div class="login-prompt"><p>You need to be logged in to join the chat.</p><br><a href="../login/login.html">Log in to participate →</a></div>`;
      return;
    }

    currentUser = session.user;
    mountNotifBell(sb, currentUser.id);

    // Get account info
    const { data: acc } = await sb.from('accounts').select('first_name,last_name,user_name,avatar_url').eq('id', currentUser.id).maybeSingle();
    currentAccount = acc;

    // Check attendance (must be going or interested)
    const { data: att } = await sb.from('event_attendance').select('status').eq('event_id', eventId).eq('account_id', currentUser.id).maybeSingle();

    // Also allow organizer
    const { data: evOrg } = await sb.from('events').select('organizer_id').eq('id', eventId).maybeSingle();
    const isOrganizer = evOrg && evOrg.organizer_id === currentUser.id;

    if (!att && !isOrganizer) {
      document.getElementById('messages').innerHTML = `<div class="not-attendee"><p>You need to RSVP to join the event chat.</p><a href="detail.html?id=${eventId}">RSVP to this event →</a></div>`;
      return;
    }

    // Load member count
    const { count } = await sb.from('event_attendance').select('*', { count: 'exact', head: true }).eq('event_id', eventId);
    if (count) document.getElementById('chat-members').textContent = `${count} attendee${count !== 1 ? 's' : ''}`;

    await loadMessages();
    subscribeRealtime();
    document.getElementById('input-area').style.display = 'flex';

    // Auto-resize textarea
    const input = document.getElementById('chat-input');
    input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px'; });
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  }

  init();
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
