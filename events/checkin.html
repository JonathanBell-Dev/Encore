<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check In — Encore ATL</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e8470a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #e8470a; --bg: #0C0C0C; --card: #141414; --border: #262626; --text: #F0EDE8; --muted: #9A9590; --success: #34c759; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; -webkit-font-smoothing: antialiased; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem 2rem; max-width: 400px; width: 100%; text-align: center; }
    .icon { width: 72px; height: 72px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    .icon svg { width: 36px; height: 36px; }
    h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; margin-bottom: .4rem; }
    .sub { color: var(--muted); font-size: .875rem; line-height: 1.6; margin-bottom: 1.75rem; }
    .event-name { font-size: 1.1rem; font-weight: 700; margin-bottom: .35rem; }
    .event-meta { font-size: .82rem; color: var(--muted); margin-bottom: 1.5rem; }
    .btn { width: 100%; padding: .9rem; border: none; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: .95rem; font-weight: 700; cursor: pointer; transition: background .18s; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-orange:hover { background: #c43a06; }
    .btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--muted); margin-top: .75rem; }
    .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="main-card">
    <div class="icon" style="background:rgba(232,71,10,.1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e8470a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 20h3"/></svg>
    </div>
    <h1>Checking you in…</h1>
    <p class="sub" id="status-msg">Loading event details</p>
    <div class="event-name" id="event-name"></div>
    <div class="event-meta" id="event-meta"></div>
    <button class="btn btn-orange" id="btn-checkin" style="display:none" onclick="doCheckin()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg>
      Check In Now
    </button>
    <a href="../homepage/home_page.html"><button class="btn btn-ghost" id="btn-home" style="display:none">Back to Encore</button></a>
  </div>

  <script>
    const SUPABASE_URL  = 'https://qgvoznhldglucpsaisfs.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFndm96bmhsZGdsdWNwc2Fpc2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTU4MjUsImV4cCI6MjA5MTc3MTgyNX0.e-5X1Lh4Tg8cP-FL-3eorV5pAZCDe4CR6i2AFeDKHWQ';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    const params = new URLSearchParams(location.search);
    const eventId = params.get('event');
    let currentUser = null;
    let eventData = null;

    function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

    function showSuccess() {
      const icon = document.querySelector('.icon');
      icon.style.background = 'rgba(52,199,89,.1)';
      icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#34c759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="36" height="36"><polyline points="20 6 9 17 4 12"/></svg>';
      document.querySelector('h1').textContent = 'You\'re checked in!';
      setStatus('Enjoy ' + (eventData?.title || 'the event') + ' 🎉');
      document.getElementById('btn-checkin').style.display = 'none';
      document.getElementById('btn-home').style.display = 'flex';
    }

    async function doCheckin() {
      const btn = document.getElementById('btn-checkin');
      btn.innerHTML = '<div class="spinner"></div>';
      btn.disabled = true;
      const { error } = await sb.from('event_checkins').upsert({ event_id: eventId, account_id: currentUser.id }, { onConflict: 'event_id,account_id' });
      if (error) { setStatus('Check-in failed. Are you on the guest list?'); btn.innerHTML = 'Try Again'; btn.disabled = false; return; }
      showSuccess();
    }

    (async () => {
      if (!eventId) { setStatus('Invalid check-in link.'); return; }

      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        setStatus('Sign in to check in.');
        document.getElementById('btn-checkin').textContent = 'Sign In';
        document.getElementById('btn-checkin').onclick = () => { window.location.href = '../login/login.html?next=' + encodeURIComponent(location.href); };
        document.getElementById('btn-checkin').style.display = 'flex';
        return;
      }
      currentUser = session.user;

      const { data: ev } = await sb.from('events').select('id,title,starts_at,venue_name').eq('id', eventId).maybeSingle();
      if (!ev) { setStatus('Event not found.'); return; }
      eventData = ev;
      document.getElementById('event-name').textContent = ev.title || 'Event';
      document.getElementById('event-meta').textContent = [
        ev.starts_at ? new Date(ev.starts_at).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) : '',
        ev.venue_name
      ].filter(Boolean).join(' · ');

      // Check if already checked in
      const { data: existing } = await sb.from('event_checkins').select('id').eq('event_id', eventId).eq('account_id', currentUser.id).maybeSingle();
      if (existing) { setStatus(''); showSuccess(); return; }

      // Check RSVP status
      const { data: rsvp } = await sb.from('event_attendance').select('status').eq('event_id', eventId).eq('account_id', currentUser.id).maybeSingle();
      if (!rsvp || rsvp.status !== 'going') {
        setStatus('You need to RSVP as "Going" before checking in.');
        const linkBtn = document.getElementById('btn-checkin');
        linkBtn.textContent = 'View Event';
        linkBtn.onclick = () => { window.location.href = `detail.html?id=${eventId}`; };
        linkBtn.style.display = 'flex';
        return;
      }

      setStatus('Tap below to confirm your arrival.');
      document.getElementById('btn-checkin').style.display = 'flex';
    })();
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
