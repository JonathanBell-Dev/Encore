  <style>
    /* ── Messages layout ── */
    .messages-layout {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 1.25rem;
      height: calc(100vh - 130px);
    }

    /* ── Thread list ── */
    .thread-panel {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .thread-panel-header {
      padding: 1.1rem 1.25rem .8rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .thread-panel-header h2 {
      font-size: 1rem; font-weight: 800; letter-spacing: -.02em;
    }
    .btn-new-msg {
      padding: .4rem .85rem;
      border-radius: 8px;
      border: none;
      background: var(--orange);
      color: #fff;
      font-size: .78rem; font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity .15s;
    }
    .btn-new-msg:hover { opacity: .85; }

    .thread-search {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .thread-search input {
      width: 100%; padding: .5rem .8rem;
      border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--light); font-family: 'Inter', sans-serif;
      font-size: .85rem; color: var(--text); outline: none;
      transition: border-color .18s;
    }
    .thread-search input:focus { border-color: var(--orange); }

    .thread-list { overflow-y: auto; flex: 1; }
    .thread-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .9rem 1.25rem; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s; position: relative;
    }
    .thread-item:hover      { background: var(--light); }
    .thread-item.active     { background: rgba(232,71,10,.06); }
    .thread-item.active .thread-name { color: var(--orange); }

    .thread-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: var(--orange); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .875rem; font-weight: 700;
    }
    .thread-avatar img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .thread-meta { flex: 1; min-width: 0; }
    .thread-name { font-size: .88rem; font-weight: 700; margin-bottom: .15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-preview { font-size: .78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-time { font-size: .72rem; color: var(--muted); flex-shrink: 0; }
    .unread-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--orange); flex-shrink: 0;
    }

    /* ── Chat panel ── */
    .chat-panel {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: .85rem;
    }
    .chat-header-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--orange); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 700; flex-shrink: 0;
    }
    .chat-header-info h3 { font-size: .95rem; font-weight: 800; letter-spacing: -.01em; }
    .chat-header-info p  { font-size: .78rem; color: var(--muted); }
    .chat-header-actions { margin-left: auto; display: flex; gap: .5rem; }
    .chat-header-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: 1.5px solid var(--border); background: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); transition: all .15s;
    }
    .chat-header-btn:hover { border-color: var(--orange); color: var(--orange); background: rgba(232,71,10,.05); }
    .chat-header-btn svg  { width: 15px; height: 15px; }

    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 1.25rem; display: flex; flex-direction: column; gap: .6rem;
    }

    /* Date separator */
    .msg-date-sep {
      display: flex; align-items: center; gap: .75rem;
      font-size: .72rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; margin: .5rem 0;
    }
    .msg-date-sep::before, .msg-date-sep::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Bubble */
    .msg-row { display: flex; align-items: flex-end; gap: .5rem; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-bubble-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--tag-bg); color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; flex-shrink: 0;
    }
    .msg-bubble {
      max-width: 68%; padding: .6rem .9rem;
      border-radius: 16px; font-size: .875rem; line-height: 1.5;
      word-break: break-word;
    }
    .msg-row:not(.mine) .msg-bubble {
      background: var(--light); border-radius: 4px 16px 16px 16px;
    }
    .msg-row.mine .msg-bubble {
      background: var(--orange); color: #fff;
      border-radius: 16px 4px 16px 16px;
    }
    .msg-time {
      font-size: .68rem; color: var(--muted); margin-top: .2rem;
      text-align: right;
    }
    .msg-row.mine .msg-time { text-align: left; }

    /* Input */
    .chat-input-bar {
      padding: .9rem 1.1rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: flex-end; gap: .75rem;
    }
    .chat-input-bar textarea {
      flex: 1; resize: none; max-height: 120px;
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: .65rem .9rem;
      font-family: 'Inter', sans-serif; font-size: .9rem; color: var(--text);
      background: var(--light); outline: none; line-height: 1.5;
      transition: border-color .18s, box-shadow .18s;
      overflow-y: auto;
    }
    .chat-input-bar textarea:focus {
      border-color: var(--orange); background: var(--light);
      box-shadow: 0 0 0 3px rgba(232,71,10,.1);
    }
    .btn-send {
      width: 40px; height: 40px; border-radius: 10px;
      border: none; background: var(--orange); color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity .18s; align-self: flex-end;
    }
    .btn-send:hover    { opacity: .85; }
    .btn-send:disabled { opacity: .4; cursor: not-allowed; }
    .btn-send svg { width: 16px; height: 16px; }

    /* Empty states */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); text-align: center; gap: .75rem; padding: 2rem;
    }
    .chat-empty svg { width: 48px; height: 48px; opacity: .3; }
    .chat-empty h3 { font-size: 1rem; font-weight: 700; color: var(--text); }
    .chat-empty p  { font-size: .85rem; max-width: 260px; }

    /* New message modal */
    .new-msg-modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.45); backdrop-filter: blur(3px);
      align-items: center; justify-content: center;
    }
    .new-msg-modal-overlay.open { display: flex; }
    .new-msg-modal {
      background: var(--card); border-radius: 16px;
      width: min(460px, 94vw); padding: 1.75rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: modal-in .2s ease;
    }
    @keyframes modal-in { from { transform: translateY(16px); opacity: 0; } }
    .new-msg-modal h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 1.25rem; }

    .user-search-results { margin-top: .5rem; max-height: 220px; overflow-y: auto; }
    .user-search-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .75rem; border-radius: 9px;
      cursor: pointer; transition: background .15s;
    }
    .user-search-item:hover { background: var(--light); }
    .user-search-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: var(--orange); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700;
    }
    .user-search-name { font-size: .88rem; font-weight: 600; }
    .user-search-handle { font-size: .78rem; color: var(--muted); }

    .new-msg-modal-actions { display: flex; gap: .75rem; margin-top: 1.25rem; justify-content: flex-end; }
    .btn-cancel-sm {
      padding: .55rem 1rem; border: 1.5px solid var(--border); border-radius: 8px;
      background: none; font-family: 'Inter', sans-serif; font-size: .85rem;
      font-weight: 600; cursor: pointer; color: var(--muted);
    }

    @media (max-width: 680px) {
      .messages-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      .thread-panel { height: 280px; }
    }
    input, textarea, select { color: #F0EDE8 !important; }
    input:focus, textarea:focus, select:focus { color: #F0EDE8 !important; }
    input:-webkit-autofill, input:-webkit-autofill:focus,
    textarea:-webkit-autofill, select:-webkit-autofill {
      -webkit-text-fill-color: #F0EDE8 !important;
    }
    input::placeholder, textarea::placeholder { color: #888; opacity: 1; }



  </style>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../src/utils/notifications.js"></script>
  <script>
    // ── CONFIG ────────────────────────────────────────────────────────────────
    const SUPABASE_URL  = 'https://qgvoznhldglucpsaisfs.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFndm96bmhsZGdsdWNwc2Fpc2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTU4MjUsImV4cCI6MjA5MTc3MTgyNX0.e-5X1Lh4Tg8cP-FL-3eorV5pAZCDe4CR6i2AFeDKHWQ';
    // ─────────────────────────────────────────────────────────────────────────

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    let currentUser    = null;
    let activeOtherId  = null;
    let realtimeSub    = null;
    let threads        = [];

    // ── Boot ──────────────────────────────────────────────────────────────────
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../login/login.html'; return; }
      currentUser = session.user;
      mountNotifBell(sb, currentUser.id);

      await loadThreads();

      // If ?user= or ?to= param, open that conversation directly
      const params = new URLSearchParams(window.location.search);
      const targetUser = params.get('user') || params.get('to');
      if (targetUser) openChat(targetUser);
    }

    // ── Load conversation threads ─────────────────────────────────────────────
    async function loadThreads() {
      // Get all messages involving current user, latest per partner
      const { data } = await sb
        .from('messages')
        .select('id, sender_id, recipient_id, body, read_at, created_at')
        .or(`sender_id.eq.${currentUser.id},recipient_id.eq.${currentUser.id}`)
        .order('created_at', { ascending: false });

      if (!data) return;

      // Deduplicate to one thread per partner
      const seen = new Map();
      for (const msg of data) {
        const other = msg.sender_id === currentUser.id ? msg.recipient_id : msg.sender_id;
        if (!seen.has(other)) seen.set(other, msg);
      }

      // Fetch partner details
      const partnerIds = [...seen.keys()];
      if (!partnerIds.length) {
        showThreadEmptyState();
        return;
      }

      const { data: partners } = await sb
        .from('accounts')
        .select('id, first_name, last_name, user_name, avatar_url')
        .in('id', partnerIds);

      const partnerMap = Object.fromEntries((partners || []).map(p => [p.id, p]));
      threads = [...seen.entries()].map(([id, msg]) => ({ otherId: id, latestMsg: msg, other: partnerMap[id] }));
      renderThreads(threads);
    }

    function showThreadEmptyState() {
      const el = document.getElementById('thread-list');
      el.innerHTML = '';
      const wrap = document.createElement('div');
      wrap.style.cssText = 'padding:2rem 1.25rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.75rem;';

      const icon = document.createElement('div');
      icon.innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';

      const h = document.createElement('p');
      h.style.cssText = 'font-size:.875rem;font-weight:700;color:var(--text);';
      h.textContent = 'No conversations yet';

      const sub = document.createElement('p');
      sub.style.cssText = 'font-size:.8rem;color:var(--muted);line-height:1.5;max-width:200px;';
      sub.textContent = 'Connect with people at events and start chatting.';

      const btn = document.createElement('button');
      btn.textContent = 'Start a conversation';
      btn.style.cssText = 'margin-top:.25rem;padding:.5rem 1rem;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:"Inter",sans-serif;';
      btn.addEventListener('click', () => {
        document.getElementById('open-new-msg').click();
      });

      wrap.appendChild(icon);
      wrap.appendChild(h);
      wrap.appendChild(sub);
      wrap.appendChild(btn);
      el.appendChild(wrap);
    }

    function renderThreads(list) {
      const el = document.getElementById('thread-list');
      if (!list.length) {
        showThreadEmptyState();
        return;
      }
      el.innerHTML = list.map(({ otherId, latestMsg, other }) => {
        const name     = other ? [other.first_name, other.last_name].filter(Boolean).join(' ') || other.user_name : 'Unknown';
        const initials = other ? ((other.first_name?.[0] || '') + (other.last_name?.[0] || '')).toUpperCase() : '?';
        const preview  = latestMsg.sender_id === currentUser.id ? `You: ${latestMsg.body}` : latestMsg.body;
        const unread   = latestMsg.sender_id !== currentUser.id && !latestMsg.read_at;
        const timeStr  = formatTime(latestMsg.created_at);
        const avatarHtml = other?.avatar_url
          ? `<img src="${other.avatar_url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">`
          : `<div class="thread-avatar">${initials}</div>`;
        return `
          <div class="thread-item${activeOtherId === otherId ? ' active' : ''}" onclick="openChat('${otherId}')">
            ${avatarHtml}
            <div class="thread-meta">
              <div class="thread-name">${name}</div>
              <div class="thread-preview">${escHtml(preview.slice(0, 60))}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.35rem;flex-shrink:0;">
              <span class="thread-time">${timeStr}</span>
              ${unread ? '<div class="unread-dot"></div>' : ''}
            </div>
          </div>`;
      }).join('');
    }

    // ── Open a chat ───────────────────────────────────────────────────────────
    async function openChat(otherId) {
      activeOtherId = otherId;

      // Mark active in thread list
      document.querySelectorAll('.thread-item').forEach(el => {
        el.classList.toggle('active', el.getAttribute('onclick').includes(otherId));
      });

      // Show chat panel
      document.getElementById('chat-empty').style.display  = 'none';
      document.getElementById('active-chat').style.display = 'flex';

      // Fetch other user
      const { data: other } = await sb
        .from('accounts')
        .select('id, first_name, last_name, user_name, avatar_url')
        .eq('id', otherId)
        .single();

      if (other) {
        const name = [other.first_name, other.last_name].filter(Boolean).join(' ') || other.user_name || 'User';
        const initials = ((other.first_name?.[0] || '') + (other.last_name?.[0] || '')).toUpperCase();
        document.getElementById('chat-other-name').textContent   = name;
        document.getElementById('chat-other-handle').textContent = '@' + (other.user_name || '');
        const avatarEl = document.getElementById('chat-other-avatar');
        if (other.avatar_url) {
          avatarEl.innerHTML = `<img src="${other.avatar_url}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;">`;
        } else {
          avatarEl.textContent = initials;
        }
        document.getElementById('view-profile-btn').href = `connection-profile.html?id=${otherId}`;
      }

      await loadMessages(otherId);
      subscribeRealtime(otherId);
    }

    // ── Load messages ─────────────────────────────────────────────────────────
    async function loadMessages(otherId) {
      const { data } = await sb
        .from('messages')
        .select('*')
        .or(
          `and(sender_id.eq.${currentUser.id},recipient_id.eq.${otherId}),` +
          `and(sender_id.eq.${otherId},recipient_id.eq.${currentUser.id})`
        )
        .order('created_at', { ascending: true });

      renderMessages(data || []);

      // Mark incoming as read
      if (data?.some(m => m.recipient_id === currentUser.id && !m.read_at)) {
        await sb.from('messages')
          .update({ read_at: new Date().toISOString() })
          .eq('recipient_id', currentUser.id)
          .eq('sender_id', otherId)
          .is('read_at', null);
      }
    }

    function renderMessages(msgs) {
      const container = document.getElementById('chat-messages');
      container.innerHTML = '';

      if (!msgs.length) {
        const ph = document.createElement('div');
        ph.setAttribute('data-placeholder', '');
        ph.style.cssText = 'flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem;';
        ph.textContent = 'No messages yet. Say hello! 👋';
        container.appendChild(ph);
        return;
      }

      let lastDate = '';
      for (const msg of msgs) {
        const d = new Date(msg.created_at);
        const dateLabel = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        if (dateLabel !== lastDate) {
          const sep = document.createElement('div');
          sep.className = 'msg-date-sep';
          sep.textContent = dateLabel;
          container.appendChild(sep);
          lastDate = dateLabel;
        }
        const mine = msg.sender_id === currentUser.id;
        const tStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

        const row = document.createElement('div');
        row.className = 'msg-row' + (mine ? ' mine' : '');
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = msg.body; // textContent — XSS-safe
        row.appendChild(bubble);
        container.appendChild(row);

        const timeEl = document.createElement('div');
        timeEl.className = 'msg-time';
        timeEl.style.textAlign = mine ? 'right' : 'left';
        timeEl.textContent = tStr;
        container.appendChild(timeEl);
      }
      container.scrollTop = container.scrollHeight;
    }

    // ── Realtime subscription ─────────────────────────────────────────────────
    // Subscribes to both incoming AND outgoing messages for the active thread.
    // Incoming: lets the other person's messages appear without a manual refresh.
    // Outgoing: handles the case where the user has messages open in multiple tabs.
    function subscribeRealtime(otherId) {
      if (realtimeSub) { sb.removeChannel(realtimeSub); }

      realtimeSub = sb
        .channel('messages-' + currentUser.id + '-' + otherId)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages',
          filter: `recipient_id=eq.${currentUser.id}`
        }, payload => {
          // Incoming message from the active conversation
          if (payload.new.sender_id === otherId) {
            appendMessage(payload.new);
            loadThreads(); // refresh thread preview

            // Mark as read immediately since the chat is open
            sb.from('messages')
              .update({ read_at: new Date().toISOString() })
              .eq('id', payload.new.id)
              .then(() => {});
          }
        })
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages',
          filter: `sender_id=eq.${currentUser.id}`
        }, payload => {
          // Outgoing message (handles multi-tab: message sent from another tab)
          if (payload.new.recipient_id === otherId) {
            appendMessage(payload.new);
          }
        })
        .subscribe((status) => {
          if (status === 'CHANNEL_ERROR') {
            showToast('Live updates disconnected. Refresh to reconnect.', 'warning');
          }
        });
    }

    // ── Append a single message bubble (used by Realtime) ────────────────────
    function appendMessage(msg) {
      const container = document.getElementById('chat-messages');

      // Remove "no messages" placeholder if present
      const placeholder = container.querySelector('[data-placeholder]');
      if (placeholder) placeholder.remove();

      const mine = msg.sender_id === currentUser.id;
      const d    = new Date(msg.created_at);
      const tStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

      // Date separator if needed
      const dateLabel = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
      const lastSep = container.querySelector('.msg-date-sep:last-of-type');
      if (!lastSep || lastSep.textContent.trim() !== dateLabel) {
        const sep = document.createElement('div');
        sep.className = 'msg-date-sep';
        sep.textContent = dateLabel;
        container.appendChild(sep);
      }

      const row = document.createElement('div');
      row.className = 'msg-row' + (mine ? ' mine' : '');

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = msg.body; // textContent — XSS-safe

      const timeEl = document.createElement('div');
      timeEl.className = 'msg-time';
      timeEl.style.textAlign = mine ? 'right' : 'left';
      timeEl.textContent = tStr;

      row.appendChild(bubble);
      container.appendChild(row);
      container.appendChild(timeEl);
      container.scrollTop = container.scrollHeight;
    }

    // ── Send message ──────────────────────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('message-input');
      const body  = input.value.trim();
      if (!body || !activeOtherId) return;

      const btn = document.getElementById('btn-send');
      input.value = '';
      input.style.height = '';
      btn.disabled = true;

      const { error } = await sb.from('messages').insert({
        sender_id:    currentUser.id,
        recipient_id: activeOtherId,
        body
      });

      btn.disabled = false;

      if (error) {
        showToast('Failed to send message. Please try again.', 'error');
        input.value = body; // restore unsent text
        return;
      }

      // Optimistically append and refresh thread list
      appendMessage({ sender_id: currentUser.id, recipient_id: activeOtherId, body, created_at: new Date().toISOString() });
      loadThreads();
    }

    // ── User search for new message ────────────────────────────────────────────
    let searchTimer = null;
    document.getElementById('user-search-input').addEventListener('input', e => {
      clearTimeout(searchTimer);
      const q = e.target.value.trim();
      if (!q) {
        document.getElementById('user-search-results').innerHTML =
          '<p style="font-size:.82rem;color:var(--muted);padding:.5rem .25rem;">Start typing to find users…</p>';
        return;
      }
      searchTimer = setTimeout(() => searchUsers(q), 300);
    });

    async function searchUsers(q) {
      const { data } = await sb
        .from('accounts')
        .select('id, first_name, last_name, user_name, avatar_url')
        .neq('id', currentUser.id)
        .or(`first_name.ilike.%${q}%,last_name.ilike.%${q}%,user_name.ilike.%${q}%`)
        .limit(8);

      const el = document.getElementById('user-search-results');
      if (!data?.length) {
        el.innerHTML = '<p style="font-size:.82rem;color:var(--muted);padding:.5rem .25rem;">No users found.</p>';
        return;
      }
      el.innerHTML = data.map(u => {
        const name     = [u.first_name, u.last_name].filter(Boolean).join(' ') || u.user_name || 'User';
        const initials = ((u.first_name?.[0] || '') + (u.last_name?.[0] || '')).toUpperCase();
        const avatar   = u.avatar_url
          ? `<img src="${u.avatar_url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`
          : `<div class="user-search-avatar">${initials}</div>`;
        return `
          <div class="user-search-item" onclick="startConvoWith('${u.id}')">
            ${avatar}
            <div>
              <div class="user-search-name">${name}</div>
              <div class="user-search-handle">@${u.user_name || ''}</div>
            </div>
          </div>`;
      }).join('');
    }

    function startConvoWith(userId) {
      document.getElementById('new-msg-overlay').classList.remove('open');
      document.getElementById('user-search-input').value = '';
      document.getElementById('user-search-results').innerHTML = '';
      openChat(userId);
    }

    // ── Thread search ─────────────────────────────────────────────────────────
    document.getElementById('thread-search-input').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      const filtered = threads.filter(({ other }) => {
        if (!other) return false;
        const name = [other.first_name, other.last_name, other.user_name].filter(Boolean).join(' ').toLowerCase();
        return name.includes(q);
      });
      renderThreads(filtered);
    });

    // ── Auto-resize textarea ───────────────────────────────────────────────────
    document.getElementById('message-input').addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    document.getElementById('message-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('btn-send').addEventListener('click', sendMessage);

    // ── Modal ─────────────────────────────────────────────────────────────────
    document.getElementById('open-new-msg').addEventListener('click', () =>
      document.getElementById('new-msg-overlay').classList.add('open'));
    document.getElementById('close-new-msg').addEventListener('click', () =>
      document.getElementById('new-msg-overlay').classList.remove('open'));
    document.getElementById('new-msg-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('new-msg-overlay'))
        document.getElementById('new-msg-overlay').classList.remove('open');
    });

    // ── Logout ────────────────────────────────────────────────────────────────
    document.getElementById('nav-logout').addEventListener('click', async e => {
      e.preventDefault();
      await sb.auth.signOut();
      window.location.href = '../login/login.html';
    });

    // ── Toast helper (inline — no ES module import needed for this page) ──────
    function showToast(message, type = 'success') {
      let c = document.getElementById('toast-container');
      if (!c) {
        c = document.createElement('div');
        c.id = 'toast-container';
        document.body.appendChild(c);
      }
      const item = document.createElement('div');
      item.className = `toast toast-${type}`;
      const icons = { success: '✓', error: '✕', info: 'i', warning: '!' };
      const iconEl = document.createElement('span');
      iconEl.className = 'toast-icon';
      iconEl.textContent = icons[type] || 'i';
      const msgEl = document.createElement('span');
      msgEl.className = 'toast-msg';
      msgEl.textContent = message;
      const closeEl = document.createElement('button');
      closeEl.className = 'toast-close';
      closeEl.textContent = '×';
      closeEl.onclick = () => dismiss(item);
      item.append(iconEl, msgEl, closeEl);
      c.appendChild(item);
      requestAnimationFrame(() => item.classList.add('toast-visible'));
      setTimeout(() => dismiss(item), 3500);
      function dismiss(el) {
        el.classList.remove('toast-visible');
        el.classList.add('toast-hiding');
        el.addEventListener('transitionend', () => el.remove(), { once: true });
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function formatTime(iso) {
      const d = new Date(iso), now = new Date();
      const diffDays = Math.floor((now - d) / 86400000);
      if (diffDays === 0) return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      if (diffDays === 1) return 'Yesterday';
      if (diffDays  < 7) return d.toLocaleDateString('en-US', { weekday: 'short' });
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    init();
  </script>
