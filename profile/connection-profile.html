<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encore – Connection Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="profile.css">
  <link rel="stylesheet" href="../css/toast.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module">
    import { guardPage } from '../src/utils/guard.js';
    guardPage();
  </script>
  <style>
    /* ── PAGE-SPECIFIC ── */
    .conn-profile-hero {
      background: linear-gradient(110deg, var(--orange) 0%, #e03000 55%, #c02800 100%);
      padding: 2.5rem 2.5rem 2rem;
      display: flex; align-items: flex-end; gap: 1.75rem;
      position: relative; overflow: hidden;
    }
    .conn-profile-hero::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 120% at 100% 50%, rgba(255,255,255,.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .conn-hero-avatar {
      position: relative; flex-shrink: 0; z-index: 1;
    }
    .conn-hero-avatar-circle {
      width: 100px; height: 100px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; font-weight: 700; color: #fff;
      background: rgba(255,255,255,.15);
    }

    .conn-hero-info { z-index: 1; flex: 1; }
    .conn-hero-name-row {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: .5rem; flex-wrap: wrap;
    }
    .conn-hero-name {
      font-size: 1.9rem; font-weight: 800;
      color: #fff; letter-spacing: -.03em; line-height: 1;
    }

    .btn-connect {
      display: inline-flex; align-items: center; gap: .45rem;
      background: #fff; border: none; color: var(--orange);
      font-family: 'Inter', sans-serif; font-size: .78rem; font-weight: 700;
      letter-spacing: .02em; padding: .45rem 1.1rem;
      border-radius: 8px; cursor: pointer;
      transition: background .18s, transform .15s;
    }
    .btn-connect:hover { background: #f8f8f8; transform: translateY(-1px); }
    .btn-connect svg { width: 13px; height: 13px; }

    .btn-connected {
      display: inline-flex; align-items: center; gap: .45rem;
      background: transparent; border: 1.5px solid rgba(255,255,255,.7);
      color: #fff; font-family: 'Inter', sans-serif;
      font-size: .78rem; font-weight: 600; letter-spacing: .02em;
      padding: .42rem 1rem; border-radius: 8px; cursor: pointer;
      transition: background .18s;
    }
    .btn-connected:hover { background: rgba(255,255,255,.15); }
    .btn-connected svg { width: 13px; height: 13px; }

    /* Content layout */
    .conn-profile-content {
      max-width: 1100px; margin: 0 auto;
      padding: 1.75rem 2.5rem;
      display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .82rem; font-weight: 600; color: var(--muted);
      text-decoration: none; margin-bottom: 1rem;
      transition: color .18s; grid-column: 1 / -1;
    }
    .back-link:hover { color: var(--text); }
    .back-link svg { width: 15px; height: 15px; }

    /* Shared events card */
    .shared-events-list {
      list-style: none; display: flex; flex-direction: column; gap: .75rem;
    }
    .shared-event-row {
      display: flex; align-items: center; gap: .85rem;
      padding: .65rem 0; border-bottom: 1px solid var(--border);
    }
    .shared-event-row:last-child { border-bottom: none; }
    .shared-event-icon {
      width: 38px; height: 38px; border-radius: 8px;
      background: var(--tag-bg); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .shared-event-icon svg { width: 16px; height: 16px; color: var(--orange); }
    .shared-event-info { flex: 1; }
    .shared-event-info p { font-size: .82rem; font-weight: 600; color: var(--text); line-height: 1.2; }
    .shared-event-info span { font-size: .72rem; color: var(--muted); }

    /* About section */
    .about-text {
      font-size: .875rem; color: var(--muted); line-height: 1.65; margin-bottom: 1rem;
    }
    .about-row {
      display: flex; align-items: center; gap: .5rem;
      font-size: .82rem; color: var(--muted); margin-bottom: .5rem;
    }
    .about-row svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--orange); }

    /* Message card */
    .message-card textarea {
      width: 100%; min-height: 80px; resize: vertical;
      font-family: 'Inter', sans-serif; font-size: .875rem; color: var(--text);
      background: var(--light); border: 1px solid var(--border);
      border-radius: 8px; padding: .65rem .85rem; outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    .message-card textarea:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(232,71,10,.1);
    }
    .btn-send {
      font-family: 'Inter', sans-serif; font-size: .82rem; font-weight: 700;
      color: #fff; background: var(--orange); border: none;
      border-radius: 8px; padding: .6rem 1.3rem; cursor: pointer;
      display: inline-flex; align-items: center; gap: .4rem;
      transition: background .18s;
    }
    .btn-send:hover { background: var(--orange-dark); }
    .btn-send svg { width: 14px; height: 14px; }

    @media (max-width: 820px) {
      .conn-profile-content { grid-template-columns: 1fr; }
      .conn-profile-hero { flex-direction: column; align-items: flex-start; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav">
    <a href="profile.html" class="nav-brand">
      <div class="nav-brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2.5" y="11" width="5" height="10" rx="2.5" fill="#fff"/><rect x="9.5" y="5" width="5" height="16" rx="2.5" fill="#fff"/><rect x="16.5" y="8" width="5" height="8" rx="2.5" fill="#fff"/></svg>
      </div>
      <span class="nav-brand-name">Encore</span>
    </a>
    <div class="nav-links">
      <a href="../homepage/home_page.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
        Explore
      </a>
      <a href="profile.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Profile
      </a>
      <a href="#" id="nav-logout" onclick="handleLogout(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>
  </nav>

  <!-- HERO — filled by JS -->
  <section class="conn-profile-hero" id="conn-hero">
    <div class="conn-hero-avatar">
      <div class="conn-hero-avatar-circle" id="hero-initials">--</div>
    </div>
    <div class="conn-hero-info">
      <div class="conn-hero-name-row">
        <h1 class="conn-hero-name" id="hero-name">Loading...</h1>
        <button class="btn-connected" id="connect-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Connected
        </button>
      </div>
      <p class="hero-location" id="hero-location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-5.8-8-12a8 8 0 0 1 16 0c0 6.2-8 12-8 12z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="hero-location-text">Atlanta, GA</span>
      </p>
      <p class="hero-bio" id="hero-bio">Encore member</p>
      <ul class="stats">
        <li><strong id="stat-events">0</strong><span>Events Attended</span></li>
        <li><strong id="stat-shared">0</strong><span>Shared Events</span></li>
        <li><strong id="stat-connections">0</strong><span>Connections</span></li>
      </ul>
    </div>
  </section>

  <!-- CONTENT -->
  <div class="conn-profile-content">

    <a href="connections.html" class="back-link" id="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Connections
    </a>

    <!-- LEFT SIDEBAR -->
    <aside>

      <!-- About -->
      <div class="card">
        <h2 class="card-title">About</h2>
        <p class="about-text" id="about-text">Encore member</p>
        <div class="about-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-5.8-8-12a8 8 0 0 1 16 0c0 6.2-8 12-8 12z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="about-location">Atlanta, GA</span>
        </div>
        <div class="about-row" style="margin-top:.25rem;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
          <span id="about-joined">Member since 2024</span>
        </div>
      </div>

      <!-- Interests -->
      <div class="card">
        <h2 class="card-title">Interests</h2>
        <ul class="interests-list" id="interests-list"></ul>
      </div>

      <!-- Message -->
      <div class="card">
        <h2 class="card-title">Message</h2>
        <button class="btn-send" id="btn-message" style="width:100%;justify-content:center;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Open Messages
        </button>
      </div>

    </aside>

    <!-- RIGHT: Shared events + activity -->
    <section style="display:flex;flex-direction:column;gap:1.25rem;">

      <div class="card">
        <h2 class="card-title">Events Attended Together</h2>
        <ul class="shared-events-list" id="shared-events-list"></ul>
      </div>


    </section>
  </div>

  <script>
    const SUPABASE_URL  = 'https://qgvoznhldglucpsaisfs.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFndm96bmhsZGdsdWNwc2Fpc2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTU4MjUsImV4cCI6MjA5MTc3MTgyNX0.e-5X1Lh4Tg8cP-FL-3eorV5pAZCDe4CR6i2AFeDKHWQ';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    let currentUser = null;
    let targetUserId = null;
    let connectionStatus = null; // null | 'pending_sent' | 'pending_received' | 'accepted'
    let connectionId = null;

    const calendarIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>`;

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = 'toast toast-' + type;
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(() => t.classList.add('toast-visible'));
      setTimeout(() => { t.classList.remove('toast-visible'); setTimeout(() => t.remove(), 300); }, 3000);
    }

    async function init() {
      const params = new URLSearchParams(location.search);
      targetUserId = params.get('id');
      if (!targetUserId) { window.location.href = 'connections.html'; return; }

      const { data: { session } } = await sb.auth.getSession();
      currentUser = session?.user || null;

      await Promise.all([
        loadProfile(),
        currentUser ? loadConnectionStatus() : Promise.resolve()
      ]);

      // Wire send-message button
      document.getElementById('btn-message').addEventListener('click', () => {
        window.location.href = 'messages.html?to=' + targetUserId;
      });
    }

    async function loadProfile() {
      const { data: profile } = await sb.from('accounts')
        .select('id,first_name,last_name,user_name,bio,location,avatar_url,created_at')
        .eq('id', targetUserId)
        .maybeSingle();

      if (!profile) {
        document.getElementById('hero-name').textContent = 'User not found';
        return;
      }

      const name = [profile.first_name, profile.last_name].filter(Boolean).join(' ') || profile.user_name || 'Encore Member';
      const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

      document.title = 'Encore – ' + name;

      const avEl = document.getElementById('hero-initials');
      if (profile.avatar_url) {
        avEl.style.backgroundImage = 'url(' + profile.avatar_url + ')';
        avEl.style.backgroundSize = 'cover';
        avEl.style.backgroundPosition = 'center';
      } else {
        avEl.textContent = initials;
      }

      document.getElementById('hero-name').textContent = name;
      document.getElementById('hero-location-text').textContent = profile.location || 'Atlanta, GA';
      document.getElementById('hero-bio').textContent = profile.bio || 'Encore member';
      document.getElementById('about-text').textContent = profile.bio || 'Encore member';
      document.getElementById('about-location').textContent = profile.location || 'Atlanta, GA';

      if (profile.created_at) {
        const joined = new Date(profile.created_at);
        document.getElementById('about-joined').textContent = 'Member since ' + joined.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
      }

      // Stats + interests in parallel
      const [{ count: evCount }, { count: connCount }, { data: interests }] = await Promise.all([
        sb.from('event_attendance').select('*', { count: 'exact', head: true }).eq('account_id', targetUserId),
        sb.from('connections').select('*', { count: 'exact', head: true })
          .or('requester_id.eq.' + targetUserId + ',addressee_id.eq.' + targetUserId)
          .eq('status', 'accepted'),
        sb.from('account_interests').select('interests(name)').eq('account_id', targetUserId)
      ]);

      document.getElementById('stat-events').textContent = evCount ?? 0;
      document.getElementById('stat-connections').textContent = connCount ?? 0;

      // Interests
      const interestsList = document.getElementById('interests-list');
      interestsList.innerHTML = '';
      if (interests && interests.length) {
        interests.forEach(row => {
          if (!row.interests?.name) return;
          const li = document.createElement('li');
          li.textContent = row.interests.name;
          interestsList.appendChild(li);
        });
      } else {
        const li = document.createElement('li');
        li.style.cssText = 'color:var(--muted);font-size:.875rem;';
        li.textContent = 'No interests listed';
        interestsList.appendChild(li);
      }

      // Shared events
      if (currentUser && currentUser.id !== targetUserId) {
        await loadSharedEvents();
      } else {
        const sharedList = document.getElementById('shared-events-list');
        const li = document.createElement('li');
        li.style.cssText = 'font-size:.875rem;color:var(--muted);padding:.5rem 0;';
        li.textContent = currentUser ? 'Viewing your own profile.' : 'Sign in to see shared events.';
        sharedList.appendChild(li);
      }
    }

    async function loadSharedEvents() {
      const { data: myAttendance } = await sb.from('event_attendance')
        .select('event_id').eq('account_id', currentUser.id);

      const myEventIds = (myAttendance || []).map(r => r.event_id);
      const sharedList = document.getElementById('shared-events-list');
      sharedList.innerHTML = '';

      if (!myEventIds.length) {
        document.getElementById('stat-shared').textContent = '0';
        const li = document.createElement('li');
        li.style.cssText = 'font-size:.875rem;color:var(--muted);padding:.5rem 0;';
        li.textContent = 'No shared events yet.';
        sharedList.appendChild(li);
        return;
      }

      const { data: shared } = await sb.from('event_attendance')
        .select('events!event_attendance_event_id_fkey(id,title,starts_at)')
        .eq('account_id', targetUserId)
        .in('event_id', myEventIds);

      document.getElementById('stat-shared').textContent = shared?.length ?? 0;

      if (!shared || !shared.length) {
        const li = document.createElement('li');
        li.style.cssText = 'font-size:.875rem;color:var(--muted);padding:.5rem 0;';
        li.textContent = 'No shared events yet.';
        sharedList.appendChild(li);
        return;
      }

      shared.forEach(row => {
        const ev = row.events;
        if (!ev) return;
        const d = new Date(ev.starts_at);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        const li = document.createElement('li');
        li.className = 'shared-event-row';

        const iconDiv = document.createElement('div');
        iconDiv.className = 'shared-event-icon';
        iconDiv.innerHTML = calendarIcon;

        const infoDiv = document.createElement('div');
        infoDiv.className = 'shared-event-info';

        const p = document.createElement('p');
        p.textContent = ev.title || 'Event';
        const span = document.createElement('span');
        span.textContent = dateStr;

        infoDiv.appendChild(p);
        infoDiv.appendChild(span);
        li.appendChild(iconDiv);
        li.appendChild(infoDiv);
        sharedList.appendChild(li);
      });
    }

    async function loadConnectionStatus() {
      const { data } = await sb.from('connections')
        .select('id,status,requester_id,addressee_id')
        .or(
          'and(requester_id.eq.' + currentUser.id + ',addressee_id.eq.' + targetUserId + '),' +
          'and(requester_id.eq.' + targetUserId + ',addressee_id.eq.' + currentUser.id + ')'
        )
        .maybeSingle();

      connectionId = data?.id || null;
      if (!data) {
        connectionStatus = null;
      } else if (data.status === 'accepted') {
        connectionStatus = 'accepted';
      } else if (data.status === 'pending') {
        connectionStatus = data.requester_id === currentUser.id ? 'pending_sent' : 'pending_received';
      } else {
        connectionStatus = null;
      }
      updateConnectionUI();
    }

    function updateConnectionUI() {
      const btn = document.getElementById('connect-btn');
      if (!currentUser || currentUser.id === targetUserId) { btn.style.display = 'none'; return; }
      btn.style.display = '';

      if (connectionStatus === 'accepted') {
        btn.className = 'btn-connected';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Connected';
        btn.onclick = handleDisconnect;
      } else if (connectionStatus === 'pending_sent') {
        btn.className = 'btn-connected';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Request Sent';
        btn.onclick = handleCancelRequest;
      } else if (connectionStatus === 'pending_received') {
        btn.className = 'btn-connect';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Accept';
        btn.onclick = handleAccept;
      } else {
        btn.className = 'btn-connect';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Connect';
        btn.onclick = handleConnect;
      }
    }

    async function handleConnect() {
      if (!currentUser) { window.location.href = '../login/signup/login.html'; return; }
      document.getElementById('connect-btn').disabled = true;
      const { data } = await sb.from('connections').insert({
        requester_id: currentUser.id, addressee_id: targetUserId, status: 'pending'
      }).select('id').single();
      connectionId = data?.id || null;
      connectionStatus = 'pending_sent';
      updateConnectionUI();
      document.getElementById('connect-btn').disabled = false;
      showToast('Connection request sent!');
    }

    async function handleCancelRequest() {
      document.getElementById('connect-btn').disabled = true;
      await sb.from('connections').delete().eq('id', connectionId);
      connectionId = null; connectionStatus = null;
      updateConnectionUI();
      document.getElementById('connect-btn').disabled = false;
      showToast('Request cancelled');
    }

    async function handleAccept() {
      document.getElementById('connect-btn').disabled = true;
      await sb.from('connections').update({ status: 'accepted' }).eq('id', connectionId);
      connectionStatus = 'accepted';
      updateConnectionUI();
      document.getElementById('connect-btn').disabled = false;
      showToast('Connected!');
    }

    async function handleDisconnect() {
      if (!confirm('Remove this connection?')) return;
      document.getElementById('connect-btn').disabled = true;
      await sb.from('connections').delete().eq('id', connectionId);
      connectionId = null; connectionStatus = null;
      updateConnectionUI();
      document.getElementById('connect-btn').disabled = false;
      showToast('Disconnected');
    }

    async function handleLogout(e) {
      e.preventDefault();
      await sb.auth.signOut();
      window.location.href = '../login/signup/login.html';
    }

    init();
  </script>

</body>
</html>
